<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 19th Birthday, Jeetesh! 🎂</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="star-layer star-sm"></div>

  <main>
    <section id="countdown-panel" class="panel">
      <h2 style="font-weight: 700; letter-spacing: 2px; opacity: 0.6;">PREPARING THE VIBE...</h2>
      <div style="font-size: 3.5rem; font-weight: 900; margin: 2rem 0; color: var(--cyan);">00:00:00</div>
      <p style="font-size: 0.8rem; opacity: 0.5;">Unlocks April 11, 2026</p>
    </section>

    <section id="birthday-panel" class="panel" hidden>
      <div id="cake-container" style="font-size: 6rem; margin-bottom: 1.5rem; display: inline-block;">🎂</div>
      
      <h1 class="neon-heading">HAPPY 19TH<br>BIRTHDAY, JEETESH!</h1>

      <div class="message-card">
        <p class="message-text">
          "We share our memories, ideas and concepts, and most of all a Bond ❤️<br>
          Happy Birthday, Brother & Bestie! 🎂"
        </p>
      </div>

      <button class="launch-btn" id="launch-btn">
        <span class="btn-icon">🎵</span>
        <span class="btn-label" id="btn-label">Launch Birthday Vibe</span>
      </button>
    </section>
  </main>

  <div id="meme-container" style="display: none;">
    <img src="https://media.tenor.com/S6-2_Zp_S6EAAAAC/oiiaoiia-cat.gif" width="180">
  </div>

  <div id="yt-player"></div>
  <script src="script.js"></script>
</body>
</html>
