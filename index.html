<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday 🎂</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background Effects (kept from your design) -->
  <div class="star-layer star-sm"></div>
  <div class="star-layer star-md"></div>
  <div class="star-layer star-lg"></div>

  <div class="orb orb-cyan"></div>
  <div class="orb orb-pink"></div>
  <div class="orb orb-purple"></div>

  <main class="app-shell">

    <!-- DIRECT BIRTHDAY PANEL -->
    <section class="birthday-panel revealed" id="birthday-panel">

      <h1 class="neon-heading">
        Happy Birthday 🎂
      </h1>

      <div class="message-card panel">
        <p class="message-text">
          "We may not have photos together, but we share memories, ideas and a bond ❤️  
          Happy Birthday, my brother!"
        </p>
      </div>

      <!-- BUTTON -->
      <div class="btn-wrap">
        <button class="launch-btn" id="launch-btn">
          <span class="btn-icon">🎵</span>
          <span id="btn-label">Launch Birthday Vibe</span>
        </button>
      </div>

    </section>

  </main>

  <!-- Hidden YouTube Player -->
  <div id="yt-player"></div>

  <script src="script.js"></script>
</body>
</html>
